Workspaces:
  # 默认工作空间
  default:
    # 工作空间路径
    path: 'plugins/Ratziel/workspace'
    # 文件过滤器
    filter: '^[^#!].*'
    # 若开启则会监听工作空间内的文件变化,并自动重新加载变化文件
    listen: true
    # 默认按文件名解析为单元素时使用 $fn
    # elementName: '$fn'
    # 默认元素类型 (None 代表不指定)
    elementType: None

Message:
  # 是否在消息组件序列化的过程中默认取消斜体
  non-italic-by-default: true
