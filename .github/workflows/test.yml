name: Plugin Test

on:
  workflow_dispatch:
    inputs:
      enable-jfr:
        description: Enable JFR
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Java
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew
      - name: Generate JFR Init Script
        if: ${{ inputs.enable-jfr }}
        run: |
          mkdir -p outs/jfr
          cat <<'EOF' > .jfr-test.init.gradle.kts
          import org.gradle.api.tasks.testing.Test

          gradle.beforeProject {
              tasks.withType<Test>().configureEach {
                  val sanitizedProjectPath = project.path.trim(':').replace(':', '-').ifEmpty { "root" }
                  val jfrDir = rootProject.layout.projectDirectory.dir("outs/jfr").asFile
                  val jfrFile = jfrDir.resolve("${sanitizedProjectPath}-${name}.jfr")

                  doFirst {
                      jfrFile.parentFile.mkdirs()
                  }

                  jvmArgs(
                      "-XX:StartFlightRecording=filename=${jfrFile.absolutePath},settings=profile,dumponexit=true"
                  )
              }
          }
          EOF
      - name: Test All Modules
        run: |
          if [ "${{ inputs.enable-jfr }}" = "true" ]; then
            ./gradlew test -I .jfr-test.init.gradle.kts
          else
            ./gradlew test
          fi
      - name: Upload JFR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jfr-${{ github.run_id }}-${{ github.run_attempt }}
          path: outs/jfr/*
